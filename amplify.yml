version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm cache clean --force
        - npm install
        - if [ ! -f src/aws-exports.js ]; then echo "const awsmobile = {}; export default awsmobile;" > src/aws-exports.js; fi
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
