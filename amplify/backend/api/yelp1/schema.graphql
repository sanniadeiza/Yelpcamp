type Restaurant @model @auth(rules: [{ allow: public }]) {
  id: ID!
  name: String!
  description: String!
  city: String!
  reviews: [Review] @hasMany(indexName: "byRestaurant", fields: ["id"])
}

type Review @model @auth(rules: [{ allow: public }]) {
  id: ID!
  restaurantID: ID! @index(name: "byRestaurant", sortKeyFields: ["createdAt"], queryField: "reviewsByRestaurantID")
  rating: Int!
  content: String!
  author: String!
}
